<!DOCTYPE html>
<html lang="en">

<head>
    <title>Unlock Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto;
            max-width: 520px;
            padding: 32px;
        }

        input {
            box-sizing: border-box;
            margin: 12px 0;
            padding: 10px;
            width: 100%;
        }

        .btn {
            background: #0088cc;
            border: 0;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            padding: 10px 14px;
        }
    </style>
</head>

<body>
    <h1>🔓 Unlock {{ name }}</h1>
    <p>Enter the encryption password used when this file was uploaded.</p>
    <form action="{{ url_for('download', code=code) }}" method="post">
        <label>Encryption password</label>
        <input type="password" name="encryption_password" required>
        <button class="btn" type="submit">Decrypt & Download</button>
    </form>
    <p><a href="{{ url_for('index') }}">← Back to files</a></p>
</body>

</html>
